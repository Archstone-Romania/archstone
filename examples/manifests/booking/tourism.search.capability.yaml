# Deploy: archstone apply tourism.search.capability.yaml
# CDL 0.2

capability:
  id: tourism.search
  description: Find accommodation matching customer preferences.
  effect: read

  input:
    destination:
      type: location
    dates:
      type: date-range
    travelers:
      type: party
    preferences:
      type: preference-set
      required: false

  output:
    accommodations:
      collection: Accommodation

  # `authenticated` intentionally removed (#32/ADD-32): this is a public, service-account
  # -style search demo, not a "whose data" capability — see tourism/tourism.search for
  # the fuller rationale.
  policies:
    - rate-limited

  provider: booking-api
