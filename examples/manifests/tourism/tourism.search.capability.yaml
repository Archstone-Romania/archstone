# The whole integration — 12 lines of business, zero HTTP.
capability:
  id: tourism.search
  description: Find places to stay matching a traveler's destination, dates, party and budget.
  effect: read

  input:
    destination:
      type: location
    dates:
      type: date-range
    travelers:
      type: party
    budget:
      type: money
      required: false

  output:
    stays:
      collection: Stay

  policies:
    - authenticated

  provider: booking-engine
