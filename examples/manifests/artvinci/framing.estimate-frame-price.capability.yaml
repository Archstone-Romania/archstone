capability:
  id: framing.estimate-frame-price
  description: Estimate the total price to frame an artwork of given dimensions in a chosen frame profile.
  effect: read

  input:
    frameProfileId:
      type: identifier
      description: The id of a frame profile, as returned by framing.list-frame-profiles.
    widthCm:
      type: quantity
      description: Artwork width, in centimeters.
    heightCm:
      type: quantity
      description: Artwork height, in centimeters.

  output:
    estimate:
      type: framing.FramePriceEstimate

  provider: artvinci-api
