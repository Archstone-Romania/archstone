# Implementation binding — how framing.estimate-frame-price reaches the backend. NOT CDL.
binding:
  capabilityId: framing.estimate-frame-price
  connector:
    type: rest
    rest:
      baseUrl: "${ARTVINCI_API_URL}"
      method: GET
      path: /api/v1/catalog/frames/{frameProfileId}/price
      # The backend expects width_cm/height_cm as query params (snake_case); the CDL input
      # stays camelCase, so the wire names are remapped here (#26).
      query:
        widthCm: width_cm
        heightCm: height_cm

  # Provider body → FramePriceEstimate resource, single object at the response root (no
  # `collection` — one estimate per call). estimatedPrice can be null when the profile has
  # no price data configured → DEGRADED, not a violation; currency is always present.
  response:
    resource: framing.FramePriceEstimate
    map:
      estimatedPrice: "$.estimatedPrice"
      currency: "$.currency"

  # What we last verified the live production API returns (ADD-18). `archstone verify`
  # replays fixtures/framing.estimate-frame-price.golden.json's `request` live and compares
  # the response shape. Fingerprint recorded 2026-07-17 against https://api.artvinci.ro,
  # profile AV8, 40x60cm.
  contract:
    source: recorded
    fingerprint: "sha256:c6abec29333dbee85da50e2e7bd24846386375939e666d27e9fdd62b166c6764"
    verifiedAt: "2026-07-17T00:00:00Z"
    probe:
      fixture: fixtures/framing.estimate-frame-price.golden.json
